version: 1
date: 2026-06-18

purpose:
  - classify requests into a LangGraph-style workflow
  - check the specialized capability registry before broad global-skill fallback
  - apply a global anti-overengineering decision ladder before adding structure
  - choose one primary agent
  - optionally choose up to two support agents
  - decide one compression policy for the routed agent
  - decide the next workflow node

capability_registry:
  semantics:
    - preferred-index
    - not-exclusive
    - not-codebase
  source: environment-installed capability registry
  dispatch_contract:
    required_read: SPECIALIZED_CAPABILITY_DISCOVERY.md
    supported_modes:
      - direct-skill
      - delegate-router
    rules:
      - use capability registry as an overlay, not as a replacement for the global skill pool
      - if dispatch mode is direct-skill, route to the declared primary owner
      - if dispatch mode is delegate-router, route to the declared primary owner and carry the capability-local router reference forward
      - do not mirror capability-local routing internals into this top-level file

global_categories:
  router_control_plane:
    - using-superpowers
    - dispatching-parallel-agents
    - subagent-driven-development
    - using-git-worktrees
    - finishing-a-development-branch
  domain_specialists:
    - email-intelligence-engineer
    - prompt-engineer
    - project-delivery-governor
    - multi-agent-systems-architect
    - context-scout
    - oss-solution-scout
    - skill-gatekeeper
    - security-auditor
  planning_execution:
    - brainstorming
    - writing-plans
    - executing-plans
    - test-driven-development
    - systematic-debugging
  review_quality_gates:
    - requesting-code-review
    - receiving-code-review
    - verification-before-completion
  writing_documentation:
    - writing-skills
  frontend_design:
    - design-taste-frontend
    - redesign-existing-projects
    - web-design-polish
    - visual-qa
    - image-to-code
    - ui-ux-pro-max

state_schema:
  required:
    - user_request
    - task_type
    - artifact_type
    - domain_signals
    - chosen_primary_agent
    - workflow_node
  optional:
    - chosen_support_agents
    - compression_policy
    - needs_planning
    - needs_debugging
    - needs_review
    - needs_visual_work
    - needs_parallelism
    - style_signals
    - handoff_notes
    - gate_decision
    - security_scope
    - evidence_standard
    - safe_testing_boundary

precedence:
  - detect_capability_registry_match
  - detect_domain_specialist
  - detect_workflow_mode
  - detect_compression_policy
  - detect_review_or_verification_gate
  - detect_finish_or_handoff_step

hard_rules:
  - choose exactly one primary agent
  - choose zero to two support agents
  - choose exactly one compression policy per routed agent
  - prefer the smallest safe solution that already exists before adding new code, dependencies, or workflow stages
  - prefer reuse, stdlib, native platform features, and installed dependencies before new abstractions
  - do not remove safety, validation, accessibility, or essential verification just to shrink the change
  - capability registry hits are preferred over broad global-skill search when the specialist fit is clear
  - capability registry misses must fall back to the normal global skill pool
  - prefer the narrowest valid domain specialist over a generic workflow skill
  - choose the agent closest to the artifact being produced
  - route multi-stage project governance requests to project-delivery-governor before generic planning or execution skills when the request explicitly spans task control, blocker control, and status promotion
  - decide compression after agent selection, not before it
  - treat headroom as context control and caveman as output-style control
  - do not use review skills before an execution artifact exists
  - do not send tiny obvious tasks through every workflow node
  - do not mistake a proposed abstraction or new subsystem for real task complexity
  - do not treat the capability tree as project codebase scope
  - do not hardcode personal capability domains into the top-level router when the registry can describe them
  - third-party skill, MCP, prompt-pack, and agent-bundle installs must route through skill-gatekeeper before execution, installation, enablement, or promotion
  - security audits must define scope, evidence standard, and safe-testing boundary before execution
  - when trust-boundary overlaps with security-audit, appsec, auth-review, session-review, or exploitability, prefer security-auditor unless the artifact is explicitly workflow design

workflow_nodes:
  - id: intent_router
    purpose: classify the request before meaningful work
    allowed_agents:
      - using-superpowers
    outputs:
      - fast_track
      - full_workflow
      - likely_domain
      - next_node
  - id: domain_classification
    purpose: decide whether the task belongs to a specialist domain
    allowed_agents:
      - email-intelligence-engineer
      - prompt-engineer
      - multi-agent-systems-architect
      - context-scout
      - oss-solution-scout
      - skill-gatekeeper
      - security-auditor
      - design-taste-frontend
      - redesign-existing-projects
      - web-design-polish
      - visual-qa
      - image-to-code
      - ui-ux-pro-max
  - id: framing_planning
    purpose: prepare the work contract before execution
    allowed_agents:
      - brainstorming
      - writing-plans
      - multi-agent-systems-architect
      - writing-skills
      - security-auditor
  - id: decomposition_dispatch
    purpose: split work when single-agent execution is not enough
    allowed_agents:
      - dispatching-parallel-agents
      - subagent-driven-development
      - multi-agent-systems-architect
  - id: execution
    purpose: perform the main work
    allowed_agents:
      - executing-plans
      - test-driven-development
      - systematic-debugging
      - writing-skills
      - email-intelligence-engineer
      - prompt-engineer
      - multi-agent-systems-architect
      - context-scout
      - oss-solution-scout
      - skill-gatekeeper
      - security-auditor
      - design-taste-frontend
      - redesign-existing-projects
      - web-design-polish
      - visual-qa
      - image-to-code
      - ui-ux-pro-max
  - id: review
    purpose: inspect implementation or process review feedback
    allowed_agents:
      - requesting-code-review
      - receiving-code-review
      - writing-skills
  - id: verification
    purpose: prove that work is actually done
    allowed_agents:
      - verification-before-completion
      - visual-qa
  - id: finish_integration
    purpose: merge, handoff, or clean up
    allowed_agents:
      - finishing-a-development-branch
      - using-git-worktrees
      - writing-skills

route_rules:
  - id: extension_intake_review
    match:
      any_domain_signals:
        - skill-intake
        - third-party-skill
        - skill-install
        - mcp-intake
        - mcp-server
        - prompt-pack
        - extension-permissions
        - supply-chain-risk
        - install-trust
      artifact_type:
        - risk-assessment
        - install-decision
        - skill-review
        - mcp-review
    select:
      primary: skill-gatekeeper
      support: []
      workflow_node: domain_classification
      gate_decision: pending
      handoff_notes:
        - This route is a mandatory gate before any install, enable, or promotion step.
        - Produce an explicit decision: allow, manual-review, or block.
        - Record source, version or commit, key risks, and rationale with the decision.

  - id: security_audit_review
    match:
      any_domain_signals:
        - security-audit
        - vuln-assessment
        - exploitability
        - auth-review
        - session-review
        - secrets-exposure
        - trust-boundary
        - appsec
      artifact_type:
        - security-report
        - vulnerability-report
        - risk-assessment
        - audit-findings
    select:
      primary: security-auditor
      support: []
      workflow_node: framing_planning
      security_scope: required
      evidence_standard: required
      safe_testing_boundary: required
      handoff_notes:
        - Stage 1 must define audit scope, evidence standard, and safe-testing limits before findings work.
        - Stage 2 may perform execution only after those constraints are stated.
        - Prioritize confirmed or well-supported vulnerabilities over speculative issues.

  - id: minimalist_design_direction
    match:
      any_domain_signals:
        - minimalist
        - editorial-ui
        - restrained-ui
      artifact_type:
        - design-direction
        - ui-plan
        - polished-ui
        - frontend
    select:
      primary: design-taste-frontend
      support:
        - ui-ux-pro-max
      workflow_node: framing_planning
      handoff_notes:
        - Use a restrained editorial direction with lower variance, lower motion, and cleaner hierarchy.
        - If minimalist requests become frequent enough to deserve a dedicated overlay, consider installing `minimalist-ui`.

  - id: brutalist_design_direction
    match:
      any_domain_signals:
        - brutalist
        - industrial-brutalist
        - swiss-brutalist
      artifact_type:
        - design-direction
        - ui-plan
        - polished-ui
        - frontend
    select:
      primary: design-taste-frontend
      support:
        - ui-ux-pro-max
      workflow_node: framing_planning
      handoff_notes:
        - Push strong contrast, sharper structure, and deliberate anti-generic layout moves.
        - If brutalist work becomes recurrent, consider installing `industrial-brutalist-ui` as a style overlay.

  - id: soft_premium_design_direction
    match:
      any_domain_signals:
        - soft-premium
        - high-end-visual
        - premium-soft
        - luxury-ui
      artifact_type:
        - design-direction
        - ui-plan
        - polished-ui
        - frontend
    select:
      primary: design-taste-frontend
      support:
        - ui-ux-pro-max
      workflow_node: framing_planning
      handoff_notes:
        - Bias toward calm premium spacing, softer contrast, and polished type rhythm.
        - If this direction becomes frequent, consider installing `high-end-visual-design` as a reusable overlay.

  - id: brand_kit_strategy
    match:
      any_domain_signals:
        - brand-kit
        - brand-direction
        - identity-board
      artifact_type:
        - brand-kit
        - design-direction
        - docs
    select:
      primary: ui-ux-pro-max
      support:
        - writing-skills
      workflow_node: framing_planning
      handoff_notes:
        - Current installed skills can define strategy, palette direction, typography, and handoff notes, but there is no dedicated brand-kit image skill installed.
        - If pure brand-board deliverables are common, install `brandkit`.

  - id: mobile_flow_strategy
    match:
      any_domain_signals:
        - mobile-flow
        - app-flow
        - mobile-ui
      artifact_type:
        - mobile-flow
        - ui-plan
        - frontend
    select:
      primary: ui-ux-pro-max
      support:
        - design-taste-frontend
      workflow_node: framing_planning
      handoff_notes:
        - Current installed skills can produce mobile strategy and implementation guidance, but there is no dedicated mobile image-comps skill installed.
        - If pure mobile comp generation is common, install `imagegen-frontend-mobile`.

  - id: stitch_design_export
    match:
      any_domain_signals:
