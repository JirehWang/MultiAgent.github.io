      support:
        - ui-ux-pro-max
      workflow_node: framing_planning
      handoff_notes:
        - Current stack can produce a compact `DESIGN.md`, but there is no dedicated Stitch-compatible overlay installed.
        - If Stitch-specific export or format compatibility becomes common, install `stitch-design-taste`.

  - id: full_output_risk_design_task
    match:
      any_domain_signals:
