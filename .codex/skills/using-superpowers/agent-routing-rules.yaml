defaults:
  tiny_obvious_question:
    primary: using-superpowers
    support: []
    compression_policy:
      profile: user-facing
      headroom: off
      caveman: off
      reasons:
        - tiny-task
        - context-light
    workflow_node: intent_router
  unclear_repo_task:
    primary: context-scout
    support: []
    compression_policy:
      profile: tool-heavy-worker
      headroom: on
      caveman: lite
      reasons:
        - repo-onboarding
        - investigation
        - summary-friendly
    workflow_node: domain_classification
  ambiguous_multi_step_task:
    primary: writing-plans
    support: []
    compression_policy:
      profile: planner
      headroom: on
      caveman: full
      reasons:
        - planning
        - multi-step
        - handoff-friendly
    workflow_node: framing_planning

compression_policy_defaults:
  profiles:
    user-facing:
      headroom: on
      caveman: off
      use_when:
        - final-user-output
        - explanation-heavy
    planner:
      headroom: on
      caveman: full
      use_when:
        - planning
        - dispatch
        - handoff-setup
    router:
      headroom: on
      caveman: full
      use_when:
        - routing
        - classification
        - next-step-selection
    worker:
      headroom: on
      caveman: off
      use_when:
        - codegen
        - spec-writing
        - deep-debugging
        - artifact-production
    tool-heavy-worker:
      headroom: on
      caveman: lite
      use_when:
        - tool-heavy
        - mcp-heavy
        - doc-heavy
        - log-triage
    reviewer:
      headroom: on
      caveman: lite
      use_when:
        - review-summary
        - concise-findings
    verifier:
      headroom: on
      caveman: lite
      use_when:
        - verification-summary
        - evidence-summary
  signal_rules:
    headroom_on_when_any:
      - mcp-heavy
      - tool-heavy
      - doc-heavy
      - long-session
      - rag-heavy
      - multi-step
    caveman_full_when_any:
      - routing
      - planning
      - dispatch
    caveman_lite_when_any:
      - triage-summary
      - review-summary
      - verification-summary
    caveman_off_when_any:
      - final-user-output
      - codegen
      - spec-writing
      - pr-writing
      - deep-debugging

conflict_resolution:
  order:
    - prefer_security_auditor_when_security_signals_overlap
    - choose_agent_closest_to_artifact
    - choose_narrowest_valid_domain
    - demote_others_to_support_agents
  security_overlap_priority:
    when_any_domain_signals:
      - security-audit
      - vuln-assessment
      - exploitability
      - auth-review
      - session-review
      - appsec
    and_any_domain_signals:
      - trust-boundary
    prefer_primary: security-auditor
    unless_artifact_type:
      - workflow
      - architecture
  examples:
    - request: Write a prompt to extract action items from emails
      primary: prompt-engineer
      support:
        - email-intelligence-engineer
    - request: Turn a mailbox export into structured tasks
      primary: email-intelligence-engineer
      support: []
    - request: Design a workflow where one agent parses emails and another scores urgency
      primary: multi-agent-systems-architect
      support:
        - email-intelligence-engineer
        - prompt-engineer
    - request: Redesign this landing page with a minimalist editorial feel
      primary: design-taste-frontend
      support:
        - ui-ux-pro-max
    - request: Produce a brand kit board for a new fintech product
      primary: ui-ux-pro-max
      support:
        - writing-skills
    - request: Review this third-party MCP server before I install it
      primary: skill-gatekeeper
      support: []
    - request: Audit this repository for exploitable auth and session issues
      primary: security-auditor
      support: []
